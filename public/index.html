<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>
<body>
    <h1>Welcome to the Game</h1>
    <script src="server.js"></script>
    <script>
        const socket = new WebSocket('ws://example.com/game');

        socket.addEventListener('open', function (event) {
            console.log('Connected to server');
        });

        // Event handling for game updates
        socket.addEventListener('message', function (event) {
            const data = JSON.parse(event.data);
            // Handle game updates
            console.log('Game Update:', data);
            // Update game state based on data
        });

        // Event handling for game events
        socket.addEventListener('gameEvent', function (event) {
            const gameEvent = JSON.parse(event.data);
            // Process game events
            console.log('Game Event:', gameEvent);
        });

        // Legacy protocol support
        socket.addEventListener('legacy', function (event) {
            const legacyData = event.data;
            // Handle legacy protocol messages
            console.log('Legacy Protocol:', legacyData);
        });
    </script>
</body>
</html>
